<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Conversor de Moedas</title>
</head>
<body>
    <div class="container">
        <h1>Conversor de Moedas</h1>

        <form class="converter-form" id="converterForm">
            <div class="currency-row">
                <div class="currency-input">
                    <label for="amount">Valor</label>
                    <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" required>
                </div>
                <div class="currency-select">
                    <label>De</label>
                    <div class="select-wrapper">
                        <select id="fromCurrency">
                            <option value="BRL" data-country="BR" selected>BRL - Real</option>
                            <option value="USD" data-country="US">USD - Dólar</option>
                            <option value="EUR" data-country="EU">EUR - Euro</option>
                            <option value="GBP" data-country="GB">GBP - Libra</option>
                            <option value="JPY" data-country="JP">JPY - Iene</option>
                            <option value="CAD" data-country="CA">CAD - Dólar Canadense</option>
                            <option value="AUD" data-country="AU">AUD - Dólar Australiano</option>
                            <option value="CHF" data-country="CH">CHF - Franco Suíço</option>
                            <option value="CNY" data-country="CN">CNY - Yuan</option>
                            <option value="ARS" data-country="AR">ARS - Peso Argentino</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="currency-row">
                <div class="currency-input">
                    <label>Resultado</label>
                    <input type="text" readonly id="convertedAmount" placeholder="Valor convertido">
                </div>
                <div class="currency-select">
                    <label>Para</label>
                    <div class="select-wrapper">
                        <select id="toCurrency">
                            <option value="USD" data-country="US" selected>USD - Dólar</option>
                            <option value="BRL" data-country="BR">BRL - Real</option>
                            <option value="EUR" data-country="EU">EUR - Euro</option>
                            <option value="GBP" data-country="GB">GBP - Libra</option>
                            <option value="JPY" data-country="JP">JPY - Iene</option>
                            <option value="ARS" data-country="AR">ARS - Peso Argentino</option>
                        </select>
                    </div>
                </div>
            </div>

            <button type="submit" class="converter-btn">Converter Agora</button>
        </form>

        <div class="loading">
            <div class="spinner"></div>
            <p>Buscando cotação...</p>
        </div>

        <div class="result"></div>
        <div class="error"></div>

        <div class="info">
            <p>Taxas atualizadas em tempo real</p>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
